<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>Sign up</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="/static/css/signup.css">
    </head>
    <body>
       <h1>Sign up page</h1>
       <form method="post" action="/signup/">
           {% csrf_token %}
        Name: <input type="text" name="name" placeholder="Enter your name"><br><br>
        Email: <input type="email" name="email" placeholder="Enter your email"><br><br>
        Contact: <input type="text" name="contact" placeholder="Enter your contact"><br><br>
        Password: <input type="password" name="password" placeholder="Enter your password"><br><br>
        Confirm Password: <input type="password" name="confirm_password" placeholder="Confirm your password"><br><br>
        <input type="submit" value="Register">
    </form>
        
        <script src="" async defer></script>
    </body>
</html>
